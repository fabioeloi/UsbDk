# ARM64 Build Workflow for UsbDk
#
# NOTE: Deployment to a real ARM64 device requires either:
#   - Test-signing mode: bcdedit /set testsigning on
#   - WHQL/EV signing for production deployment
#
# This workflow builds the ARM64 (Win10 Release) configuration of UsbDk.
# The windows-latest runner includes Component.Microsoft.Windows.DriverKit
# (WDK 10.0.26100+) pre-installed as part of VS2022 Enterprise.
# VsDevCmd.bat initialises the full VS + WDK build environment so that
# the WindowsKernelModeDriver10.0 MSBuild toolset can locate ntifs.h and
# the other kernel-mode headers from the km\ include directory.

name: Build ARM64

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-arm64:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build ARM64 Release
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=arm64 -host_arch=amd64
          msbuild UsbDk.sln /p:Configuration="Win10 Release" /p:Platform=ARM64 /m /t:UsbDk

      - name: Build ARM64 Debug (NoSign)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=arm64 -host_arch=amd64
          msbuild UsbDk.sln /p:Configuration="Win10 Debug_NoSign" /p:Platform=ARM64 /m /t:UsbDk

      - name: Upload ARM64 Release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: usbdk-arm64-release
          path: |
            Install/ARM64/**/*.sys
            Install/ARM64/**/*.inf
            Install/ARM64/**/*.cat
          if-no-files-found: warn

      - name: Upload ARM64 Debug artifacts
        uses: actions/upload-artifact@v4
        with:
          name: usbdk-arm64-debug
          path: |
            Install_Debug/ARM64/**/*.sys
            Install_Debug/ARM64/**/*.inf
          if-no-files-found: warn

